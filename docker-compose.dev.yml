services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: approval-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: app_db
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Development Application Service
  app:
    image: node:20-alpine
    container_name: approval-app
    ports:
      - "3000:3000"
    working_dir: /app
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://postgres:changeme@db:5432/app_db?schema=public"
      NEXTAUTH_URL: "http://localhost:3000"
      NEXTAUTH_SECRET: "dev-secret-change-in-production-abc123"
      UPLOAD_DIR: "public/uploads"
      CRON_SECRET: "test-cron-secret-local"
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    command: sh -c "npm install && npx prisma generate && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  # Prisma Studio Service
  studio:
    image: node:20-alpine
    container_name: approval-studio
    ports:
      - "5555:5555"
    working_dir: /app
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://postgres:changeme@db:5432/app_db?schema=public"
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx prisma studio --hostname 0.0.0.0"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
