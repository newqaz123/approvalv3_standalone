services:
  # PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: approval-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-app_db}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-app_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
    restart: unless-stopped

  # Database Migration Service (runs once before app starts)
  migrate:
    build:
      context: .
      target: builder
    container_name: approval-migrate
    command: npx prisma migrate deploy
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    restart: "no"

  # Development Application Service
  dev:
    build:
      context: .
      target: builder
    container_name: approval-dev
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://postgres:changeme@db:5432/app_db?schema=public"
    volumes:
      - .:/app
      - /app/node_modules
      - uploads_data:/app/public/uploads
    command: sh -c "npx prisma generate && npm run dev"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - dev

  # Prisma Studio Service
  studio:
    build:
      context: .
      target: builder
    container_name: approval-studio
    ports:
      - "5555:5555"
    env_file:
      - .env.local
    environment:
      NODE_ENV: development
      DATABASE_URL: "postgresql://postgres:changeme@db:5432/app_db?schema=public"
    volumes:
      - .:/app
      - /app/node_modules
    command: npx prisma studio --hostname 0.0.0.0
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - dev

  # Application Service
  app:
    build:
      context: .
      target: runner
    container_name: approval-app
    ports:
      - "3000:3000"
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
    volumes:
      - uploads_data:/app/public/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# Named Volumes for persistence
volumes:
  db_data:
    driver: local
  uploads_data:
    driver: local
